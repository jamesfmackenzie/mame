name: Release (namcos22)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. namco-c139-2026-04-13)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            binary: namcos22-linux.zip
          - os: macos-latest
            name: macos
            binary: namcos22-macos.zip
          - os: windows-latest
            name: windows
            binary: namcos22-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libsdl2-dev libsdl2-ttf-dev libfontconfig-dev libasound2-dev libxinerama-dev libxi-dev qt6-base-dev qt6-base-dev-tools

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install python3 sdl3 dylibbundler

    - name: Set up MSYS2 (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          git
          make
          zip
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-python
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_ttf
          mingw-w64-x86_64-portaudio

    - name: Build (Linux)
      if: matrix.os == 'ubuntu-latest'
      env:
        OVERRIDE_CC: clang
        OVERRIDE_CXX: clang++
        SUBTARGET: namcos22
        SOURCEFILTER: src/mame/namcos22.flt
      run: make -j3

    - name: Bundle binary (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: zip namcos22-linux.zip namcos22

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      env:
        SUBTARGET: namcos22
        USE_LIBSDL: 1
        SOURCEFILTER: src/mame/namcos22.flt
      run: make -j3

    - name: Bundle dylibs (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p libs
        dylibbundler -od -b -x namcos22 -d libs/ -p @executable_path/libs/
        zip -r namcos22-macos.zip namcos22 libs/

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: make -j3 SUBTARGET=namcos22 SOURCEFILTER=src/mame/namcos22.flt

    - name: Bundle binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: zip namcos22-windows.zip namcos22.exe

    - name: Upload binary
      uses: actions/upload-artifact@main
      with:
        name: namcos22-${{ matrix.name }}
        path: ${{ matrix.binary }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: Download all binaries
      uses: actions/download-artifact@main
      with:
        path: artifacts/

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release delete "${{ github.event.inputs.tag }}" --yes 2>/dev/null || true
        gh release create "${{ github.event.inputs.tag }}" \
          --title "${{ github.event.inputs.tag }}" \
          --notes "namcos22 binaries built from branch \`${{ github.ref_name }}\` at \`${{ github.sha }}\`." \
          artifacts/namcos22-linux/namcos22-linux.zip \
          artifacts/namcos22-macos/namcos22-macos.zip \
          artifacts/namcos22-windows/namcos22-windows.zip
