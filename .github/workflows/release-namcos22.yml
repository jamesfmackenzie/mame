name: Release (namcos22)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. namco-c139-jb-2026-04-13)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        fetch-depth: 0
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libsdl2-dev libsdl2-ttf-dev libfontconfig-dev libasound2-dev libxinerama-dev libxi-dev qt6-base-dev qt6-base-dev-tools
    - name: Build
      env:
        OVERRIDE_CC: clang
        OVERRIDE_CXX: clang++
        SUBTARGET: namcos22
      run: make -j3
    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ github.event.inputs.tag }}" \
          --title "${{ github.event.inputs.tag }}" \
          --notes "namcos22 binary built from branch \`${{ github.ref_name }}\` at ${{ github.sha }}" \
          namcos22
